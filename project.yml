name: TicTacToe
options:
  bundleIdPrefix: com.tictactoe
  deploymentTarget:
    iOS: "17.0"
targets:
  TicTacToe:
    type: application
    platform: iOS
    sources:
      - TicTacToe
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        SWIFT_VERSION: "5.9"
